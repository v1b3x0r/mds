<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!-- MDS — Material Definition System · social card -->
  <!-- Motif: eight strata of a living world, one essence rising through them -->

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05060a"/>
      <stop offset="1" stop-color="#0a0d14"/>
    </linearGradient>
    <linearGradient id="stratum7" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1b2a3d"/><stop offset="1" stop-color="#162232"/>
    </linearGradient>
    <linearGradient id="stratum6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a2e3a"/><stop offset="1" stop-color="#142630"/>
    </linearGradient>
    <linearGradient id="stratum5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1d3138"/><stop offset="1" stop-color="#16282e"/>
    </linearGradient>
    <linearGradient id="stratum4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#23333a"/><stop offset="1" stop-color="#1a2a30"/>
    </linearGradient>
    <linearGradient id="stratum3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2a3340"/><stop offset="1" stop-color="#202935"/>
    </linearGradient>
    <linearGradient id="stratum2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#33323f"/><stop offset="1" stop-color="#272633"/>
    </linearGradient>
    <linearGradient id="stratum1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a3140"/><stop offset="1" stop-color="#2d2533"/>
    </linearGradient>
    <linearGradient id="stratum0" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#413647"/><stop offset="1" stop-color="#332a39"/>
    </linearGradient>
    <radialGradient id="essenceGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe9a8" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#ffd166" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="riseTrail" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ffd166" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffd166" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#sky)"/>

  <!-- faint stars -->
  <g fill="#9fb4d8">
    <circle cx="980" cy="70" r="1.4" opacity="0.5"/>
    <circle cx="1110" cy="120" r="1" opacity="0.35"/>
    <circle cx="860" cy="48" r="1" opacity="0.3"/>
    <circle cx="1210" cy="60" r="1.2" opacity="0.4"/>
    <circle cx="918" cy="150" r="0.9" opacity="0.3"/>
    <circle cx="1042" cy="38" r="0.9" opacity="0.35"/>
  </g>

  <!-- ===== left: the world stack (8 strata, layer 7 on top) ===== -->
  <g transform="translate(96, 96)">
    <!-- strata bands, slightly offset like a geological column -->
    <g font-family="Menlo, SF Mono, Consolas, monospace" font-size="15">
      <g transform="translate(8,0)">
        <rect width="380" height="50" rx="6" fill="url(#stratum7)"/>
        <text x="18" y="31" fill="#8fb6e8">7 · interface</text>
        <text x="370" y="31" fill="#54718f" text-anchor="end">the boundary</text>
      </g>
      <g transform="translate(0,56)">
        <rect width="380" height="50" rx="6" fill="url(#stratum6)"/>
        <text x="18" y="31" fill="#8fd8d2">6 · world</text>
        <text x="370" y="31" fill="#4f7b77" text-anchor="end">the container</text>
      </g>
      <g transform="translate(12,112)">
        <rect width="380" height="50" rx="6" fill="url(#stratum5)"/>
        <text x="18" y="31" fill="#93dcc0">5 · network</text>
        <text x="370" y="31" fill="#527e6c" text-anchor="end">between worlds</text>
      </g>
      <g transform="translate(4,168)">
        <rect width="380" height="50" rx="6" fill="url(#stratum4)"/>
        <text x="18" y="31" fill="#b8d9a4">4 · communication</text>
        <text x="370" y="31" fill="#6a7f5c" text-anchor="end">between minds</text>
      </g>
      <g transform="translate(14,224)">
        <rect width="380" height="50" rx="6" fill="url(#stratum3)"/>
        <text x="18" y="31" fill="#e3d49a">3 · cognition</text>
        <text x="370" y="31" fill="#857a52" text-anchor="end">the learning mind</text>
      </g>
      <g transform="translate(2,280)">
        <rect width="380" height="50" rx="6" fill="url(#stratum2)"/>
        <text x="18" y="31" fill="#ecbf9a">2 · physics</text>
        <text x="370" y="31" fill="#8a6e55" text-anchor="end">the material world</text>
      </g>
      <g transform="translate(10,336)">
        <rect width="380" height="50" rx="6" fill="url(#stratum1)"/>
        <text x="18" y="31" fill="#eba8b4">1 · ontology</text>
        <text x="370" y="31" fill="#8a5f68" text-anchor="end">the inner life</text>
      </g>
      <g transform="translate(0,392)">
        <rect width="380" height="50" rx="6" fill="url(#stratum0)"/>
        <text x="18" y="31" fill="#d6a9e8">0 · foundation</text>
        <text x="370" y="31" fill="#7c5f8a" text-anchor="end">what exists</text>
      </g>
    </g>

    <!-- the essence rising through every stratum -->
    <rect x="306" y="-30" width="3" height="472" fill="url(#riseTrail)" rx="1.5"/>
    <circle cx="307.5" cy="-30" r="34" fill="url(#essenceGlow)"/>
    <circle cx="307.5" cy="-30" r="5" fill="#ffe9a8"/>
  </g>

  <!-- ===== right: identity ===== -->
  <g transform="translate(580, 150)">
    <text font-family="Georgia, 'Times New Roman', serif" font-size="84" fill="#f2ead8" letter-spacing="2">MDS</text>
    <text y="44" font-family="Menlo, SF Mono, Consolas, monospace" font-size="19" fill="#7e8aa3" letter-spacing="3">MATERIAL DEFINITION SYSTEM</text>

    <text y="120" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-style="italic" fill="#cdb98a">“What if JSON could be alive?”</text>

    <!-- essence snippet -->
    <g transform="translate(0, 170)" font-family="Menlo, SF Mono, Consolas, monospace" font-size="19">
      <rect x="-22" y="-34" width="520" height="116" rx="10" fill="#0d1118" stroke="#1d2433" stroke-width="1"/>
      <text fill="#5d6878">{</text>
      <text y="34" fill="#8fb6e8"><tspan x="16">"essence"</tspan><tspan fill="#5d6878">: </tspan><tspan fill="#cdb98a">"a lonely ghost who remembers rain"</tspan></text>
      <text y="68" fill="#5d6878">}</text>
    </g>

    <!-- what it becomes -->
    <g transform="translate(0, 330)" font-family="Menlo, SF Mono, Consolas, monospace" font-size="16" fill="#6d7890">
      <text>→ feels · remembers · forgets · bonds · learns · speaks</text>
    </g>
  </g>

  <!-- footer -->
  <g font-family="Menlo, SF Mono, Consolas, monospace" font-size="14" fill="#49536a">
    <text x="96" y="606">docs/FIELD-GUIDE.md — anatomy of a living world</text>
    <text x="1184" y="606" text-anchor="end">@v1b3x0r/mds-core</text>
  </g>
</svg>
